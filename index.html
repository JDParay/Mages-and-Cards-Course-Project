<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mages & Cards - Main Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-layer" class="waterfall-bg"></div>

    <div id="main-menu-screen" class="screen">
        <div class="menu-content">
            <img src="MaCLogo.png" alt="Mages and Cards Logo" class="main-logo-img">
            <nav class="button-stack">
                <button class="game-btn" onclick="handleMenu('START')">
                    <span class="icon">►</span> Play
                </button>
                <button class="game-btn">
                    <span class="icon">📖</span> Archives
                </button>
                <button class="game-btn" onclick="openOptions()">
                    <span class="icon">⚙</span> Options
                </button>
                <button class="game-btn" onclick="openCredits()">
                    <span class="icon">👤</span> Credits
                </button>
            </nav>
        </div>
        <footer class="menu-footer">
            <div class="footer-left v-tag">v 1.0.0-alpha</div>
            <div class="footer-right studio-tag">Instinction Games</div>
        </footer>
    </div>

    <div id="campaign-screen" class="screen" style="display: none;">
        <header class="campaign-header">
            <div class="header-left">
                <button id="campaign-back-btn" class="back-btn" onclick="goBackToChapters()">↩</button>
                <button id="menu-back-btn" class="back-btn" onclick="showMainMenu()">Menu</button>
                <div class="title-group">
                    <h1 class="campaign-title">✨ Campaign Mode</h1>
                    <p id="chapter-subtitle" class="chapter-subtitle">Select a Chapter</p>
                </div>
            </div>

            <div class="user-profile-area">
                <div class="stats-row">
                    <div class="currency-pill">
                        <span class="icon">🪙</span> <span class="amount">1,250</span>
                    </div>
                    <div class="user-info">
                        <span class="username">GuardianEarth277</span>
                        <div class="avatar-circle"><span class="lvl-badge">45</span></div>
                    </div>
                </div>
                <div class="xp-container">
                    <div class="xp-bar-bg"><div class="xp-fill" style="width: 74.5%;"></div></div>
                    <span class="xp-text">7,450 / 10,000 EXP</span>
                </div>
            </div>
        </header>

        <div class="chapter-grid">
            <div class="chapter-card" onclick="openLevelSelect('antakin')">
                <img src="assets/antakin.png" alt="Antakin">
                <div class="card-info">
                    <h3>Antakin the Protector</h3>
                    <div class="progress-container"><div id="antakin-fill" class="progress-fill"></div></div>
                    <div class="progress-text" id="antakin-status">0/3 Levels</div>
                </div>
            </div>
            <div class="chapter-card" onclick="openLevelSelect('aelthred')">
                <img src="assets/aelthred.png" alt="Aelthred">
                <div class="card-info">
                    <h3>Aelthred the Grey</h3>
                    <div class="progress-container"><div id="aelthred-fill" class="progress-fill"></div></div>
                    <div class="progress-text" id="aelthred-status">0/3 Levels</div>
                </div>
            </div>
        </div>

        <div id="level-grid" class="level-grid" style="display: none;"></div>

        <footer class="campaign-footer">
            <button class="footer-btn"><span class="btn-icon">👥</span><span class="btn-text">Friends</span></button>
            <button class="footer-btn active"><span class="btn-icon">🎴</span><span class="btn-text">Edit Deck</span></button>
            <button class="footer-btn"><span class="btn-icon">🛍️</span><span class="btn-text">Buy Pack</span></button>
        </footer>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModals()"></div>

<div id="options-modal" class="modal-box">
    <span class="close-x" onclick="closeModals()">✧</span>
    <h2 class="modal-title">Options</h2>
    
    <div class="settings-container">
        <div class="slider-row">
            <label>BGM</label>
            <input type="range" class="custom-slider" id="bgm-slider">
        </div>
        <div class="slider-row">
            <label>SFX</label>
            <input type="range" class="custom-slider" id="sfx-slider">
        </div>
    </div>
</div>

<div id="credits-modal" class="modal-box">
    <span class="close-x" onclick="closeModals()">✧</span>
    <h2 class="modal-title">Credits</h2>
    <div class="credits-grid">
        <div class="credit-entry"><span>Jeko Damiel Paray</span> <span>Full-Stack Developer</span></div>
        <div class="credit-entry"><span>BGM made in</span> <span>Bandlab</span></div>
        <div class="credit-entry"><span>SFX used from</span> <a href="https://pixabay.com/sound-effects/">Pixabay</a></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
