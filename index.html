<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mages & Cards - Main Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-screen">
        <div class="menu-content">
    <img src="MaCLogo.png" alt="Mages and Cards Logo" class="main-logo-img">

            <nav class="button-stack">
                <button class="game-btn">
                    <span class="icon">►</span> Play
                </button>
                <button class="game-btn">
                    <span class="icon">📖</span> Archives
                </button>
                <button class="game-btn">
                    <span class="icon">⚙</span> Options
                </button>
                <button class="game-btn">
                    <span class="icon">👤</span> Credits
                </button>
            </nav>
        </div>

        <footer class="menu-footer">
            <div class="footer-left v-tag">v 1.0.0-alpha</div>
            <div class="footer-right studio-tag">Instinction Games</div>
        </footer>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModals()"></div>

<div id="options-modal" class="modal-box">
    <h2>OPTIONS</h2>
    <div class="setting-row">
        <label>BGM</label>
        <input type="range" id="bgm-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div class="setting-row">
        <label>SFX</label>
        <input type="range" id="sfx-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
    <button class="game-btn close-btn" onclick="closeModals()">Back</button>
</div>

<div id="credits-modal" class="modal-box">
    <h2>CREDITS</h2>
    <p><strong>Developer</strong><br>Jeko Damiel Paray</p>
    <p><strong>Music & Sound</strong><br>BGM: Artist Name<br>SFX: Library Name</p>
    <button class="game-btn close-btn" onclick="closeModals()">Back</button>
</div>
</body>
</html>
