<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mages & Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="bg-layer" class="waterfall-bg"></div>

    <div id="main-menu-screen" class="screen">
        <div class="menu-content">
            <img src="MaCLogo.png" alt="Mages and Cards Logo" class="main-logo-img">
            <nav class="button-stack">
                <button class="game-btn" onclick="showCampaign()"><span class="icon">►</span> Play</button>
                <button class="game-btn" onclick="openOptions()"><span class="icon">⚙</span> Options</button>
                <button class="game-btn" onclick="openCredits()"><span class="icon">👤</span> Credits</button>
            </nav>
        </div>
        <footer class="menu-footer">
            <div class="footer-left v-tag">v 1.0.0-pivot</div>
            <div class="footer-right studio-tag">Instinction Games</div>
        </footer>
    </div>

    <div id="campaign-screen" class="screen hidden">
    <header class="campaign-header">
        <div class="header-left">
            <button class="back-btn" onclick="goBackToMenu()">◀ BACK</button>
            <h1 class="campaign-title">SELECT CHAPTER</h1>
        </div>
    </header>

    <div class="chapter-grid">
        <div class="chapter-card" onclick="startVN()">
            <img src="chapter1_thumb.png" alt="Chapter 1">
            <div class="chapter-info">
                <p class="chapter-subtitle">CHAPTER 01</p>
                <h3>The Great Barrier</h3>
            </div>
        </div>

        <div class="chapter-card locked">
            <img src="chapter2_thumb.png" alt="Chapter 2">
            <div class="chapter-info">
                <p class="chapter-subtitle">CHAPTER 02</p>
                <h3>Whispering Woods</h3>
            </div>
        </div>
    </div>
</div>

    <div id="vn-game-screen" class="screen hidden" style="display: none;">
        <div id="vn-resource-bar">
            <div class="vn-res-item">Land: <span id="res-land">0</span></div>
            <div class="vn-res-item">Ocean: <span id="res-ocean">0</span></div>
            <div class="vn-res-item">Forest: <span id="res-forest">0</span></div>
        </div>

        <div class="vn-layout-container">
            <div id="story-box" class="modal-box story-centered">
                <p id="story-text">The world awaits your decision...</p>
            </div>

            <div id="choice-container" class="hand-container">
                </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModals()"></div>
    
    <div id="options-modal" class="modal-box" style="display:none">
        <h2 class="modal-title">Options</h2>
        <div class="settings-container">
            <div class="slider-row"><label>BGM</label><input type="range" class="custom-slider" id="bgm-slider"></div>
            <div class="slider-row"><label>SFX</label><input type="range" class="custom-slider" id="sfx-slider"></div>
        </div>
    </div>

    <div id="credits-modal" class="modal-box" style="display:none">
        <h2 class="modal-title">Credits</h2>
        <div class="credits-grid">
            <div class="credit-entry"><span>Jeko Damiel Paray</span> <span>Developer</span></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
